schema_version: 1
id: world.small

seed: 4815162342

# Milestone A world compiler (`world.small`). Density from compiled worldgen fields.

voxel:
  cell_size_m: 1.0

chunks:
  cells: [16, 16, 16]
  world_extent: [512, 52, 512]
  residency:
    density_radius: 10
    render_radius: 7
    physics_radius: 5
    decoration_radius: 5
    high_detail_radius: 4
  lod:
    terrain:
      - max_distance_chunks: 3
        mesh_resolution_scale: 1.0
        collider: full
      - max_distance_chunks: 5
        mesh_resolution_scale: 0.5
        collider: simplified
      - max_distance_chunks: 7
        mesh_resolution_scale: 0.25
        collider: none
    materials:
      render_profile: render.terrain_high
    content:
      vegetation_max_distance_m: 120
      grass_lod: [25, 70, 140]
    distant:
      horizon_skirt: true
      impostor_start_m: 600
  staging:
    prefetch_chunks_ahead: 2
    preload_atlas: true
    preload_material_arrays: true

worldgen: world.small

terrain: terrain.island_testbed_objects
biomes: biomes.expanded_slice
