schema_version: 1
id: terrain.island_testbed_objects
description: >
  Authored union/subtract objects for world.island_testbed. Base island shape,
  coast, and elevation come from island_gen.island_testbed atlas only.
  Mask ops (island_mask, ocean_floor, coastal_surface) are omitted.

spawn: [198.0, 0.0, 288.0]

includes:
  - cave.testbed_collapse

operations:
  - type: ellipsoid
    center: [210.0, 28.0, 324.0]
    radii: [24.0, 5.0, 24.0]
    combine: subtract

  - type: underwater_trench
    points:
      - [140.0, -22.0, 200.0]
      - [120.0, -28.0, 160.0]
      - [100.0, -32.0, 120.0]
    width_m: 18.0

  - type: noise_perturb
    scale: 0.3
    amplitude: 0.5
    density_min: 0.0
    density_max: 4.0
