schema_version: 1
id: terrain.vertical_slice
description: Coastal headland with ridge, overhang, and linked cave system
spawn: [-30.0, 0.0, -25.0]
includes:
  - cave.demo_cave
operations:
  - type: coastal_surface
    origin: [48.0, 48.0]
    scale: [96.0, 96.0]
    base_height: 8.0
    height_range: 14.0
    ridge_origin: [20.0, 10.0]
    ridge_scale: [30.0, 40.0]
    ridge_amplitude: 12.0
    detail_frequency: 0.04
    detail_amplitude: 4.0
    detail_octaves: 4
  - type: ellipsoid
    center: [35.0, 11.0, 15.0]
    radii: [18.0, 22.0, 12.0]
    peak_noise: [0.1, 3.0]
    combine: union
  # Single ridge envelope — hillside, cliff, and overhang lip as one solid mass.
  - type: ellipsoid
    center: [26.0, 13.0, 10.0]
    radii: [14.0, 17.0, 12.0]
    combine: union
  # Headroom carve beneath the overhang lip.
  - type: ellipsoid
    center: [28.0, 11.5, 8.0]
    radii: [6.5, 4.5, 4.5]
    combine: subtract
