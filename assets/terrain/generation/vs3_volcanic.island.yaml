schema_version: 1
id: island_gen.vs3_volcanic
description: VS3 volcanic island pipeline defaults

island:
  playable_diameter_m: 2200
  maximum_height_m: 360
  sea_level_m: 0
  lobe_count: 3
  warp_frequency: 0.004
  warp_amplitude: 18

volcano:
  center: [128.0, 128.0]
  shield_radius_m: 950
  shield_exponent: 1.3
  shield_height_m: 230
  summit_radius_m: 360
  summit_exponent: 2.4
  summit_height_m: 135
  caldera_radius_m: 90
  caldera_depth_m: 38
  caldera_rim_height_m: 12
  radial_ridge_count: 7
  collapse_direction_deg: 215
  collapse_depth_m: 45

surface_noise:
  regional_amplitude_m: 14
  local_amplitude_m: 3.5
  voxel_amplitude_m: 0.35

hydrology:
  routing: d8
  rainfall_base: 1.0
  stream_threshold: 220
  permanent_river_threshold: 900
  minimum_stream_length_m: 60

erosion:
  stream_power_iterations: 22
  m: 0.48
  n: 1.0
  maximum_step_m: 0.2
  thermal_iterations: 12
  thermal_transfer_rate: 0.16

coast:
  shelf_width_min_m: 60
  shelf_width_max_m: 300
  shelf_depth_min_m: 8
  shelf_depth_max_m: 28
  deep_slope_min: 0.18
  deep_slope_max: 0.65

beaches:
  maximum_slope_deg: 13
  width_min_m: 8
  width_max_m: 35
  berm_height_min_m: 0.6
  berm_height_max_m: 1.8

caves:
  chamber_count_min: 4
  chamber_count_max: 7
  passage_radius_min_m: 1.4
  passage_radius_max_m: 3.5
  minimum_cover_m: 4
  maximum_depth_m: 45
  overhang_enabled: true
