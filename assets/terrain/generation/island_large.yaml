schema_version: 1
id: island_gen.island_large
description: >
  Large volcanic island — fully procedural at runtime (no baked atlas dependency).
  World budget this file MUST respect (see docs/terrain_yaml_authoring.md):
    horizontal: chunks cover X/Z in [-1600, +1600); atlas covers +/-1600 (ocean_extent 3200)
    vertical:   chunks cover Y in [-416, +416); sea level is 2.0 (from water.tropical_shallow)
  Rule of thumb: footprint support radius (~0.59 * diameter + warp) must stay
  under 1600; peak elevation + noise amplitudes must stay under +414.

island:
  # Support radius = 2500 * 0.5 * 1.1775 + 22 warp = ~1494 m < 1600 m half-extent.
  playable_diameter_m: 2500
  maximum_height_m: 370
  sea_level_m: 2.0
  lobe_count: 4
  warp_frequency: 0.0022
  warp_amplitude: 22

volcano:
  center: [1600.0, 1600.0]
  shield_radius_m: 1080
  shield_exponent: 1.3
  shield_height_m: 225
  summit_radius_m: 400
  summit_exponent: 2.2
  summit_height_m: 132
  caldera_radius_m: 130
  caldera_depth_m: 40
  caldera_rim_height_m: 6
  radial_ridge_count: 11
  collapse_direction_deg: 215
  collapse_depth_m: 48

surface_noise:
  regional_amplitude_m: 12
  local_amplitude_m: 3
  voxel_amplitude_m: 0.4

hydrology:
  routing: d8
  rainfall_base: 1.0
  stream_threshold: 180
  permanent_river_threshold: 750
  minimum_stream_length_m: 80

erosion:
  stream_power_iterations: 22
  m: 0.48
  n: 1.0
  maximum_step_m: 0.2
  thermal_iterations: 12
  thermal_transfer_rate: 0.16

coast:
  shelf_width_min_m: 90
  shelf_width_max_m: 240
  shelf_depth_min_m: 8
  shelf_depth_max_m: 22
  deep_slope_min: 0.18
  deep_slope_max: 0.5

beaches:
  maximum_slope_deg: 13
  width_min_m: 10
  width_max_m: 36
  berm_height_min_m: 0.5
  berm_height_max_m: 1.4

caves:
  chamber_count_min: 6
  chamber_count_max: 9
  passage_radius_min_m: 2.2
  passage_radius_max_m: 5.0
  minimum_cover_m: 8
  maximum_depth_m: 90
  overhang_enabled: true
