schema_version: 1
id: vegetation.vertical_slice
description: Biome-driven grass, shrubs, trees, rocks, and cave moss placement
rules:
  - category: grass
    mesh: cuboid
    biomes: [grassland, beach]
    density: 0.35
    slope_max_deg: 35.0
    spacing_m: 3.0
  - category: tree
    mesh: cylinder
    biomes: [grassland]
    density: 0.08
    slope_max_deg: 25.0
    spacing_m: 6.0
  - category: rock
    mesh: sphere
    biomes: [rocky_upland]
    density: 0.15
    slope_max_deg: 60.0
    spacing_m: 4.0
  - category: shrub
    mesh: cuboid
    biomes: [grassland, beach]
    density: 0.12
    slope_max_deg: 30.0
    spacing_m: 4.0
  - category: cave_moss
    mesh: cuboid
    biomes: [cave]
    density: 0.2
    slope_max_deg: 80.0
    spacing_m: 2.5
  - category: fungus
    mesh: sphere
    biomes: [cave]
    density: 0.06
    slope_max_deg: 80.0
    spacing_m: 3.0
