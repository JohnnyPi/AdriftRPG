schema_version: 1
id: strata.tropical_volcanic
layers:
  - material: organic_soil
    thickness_m: [0.05, 0.4]
    requires:
      biome_tags: [vegetated]
  - material: topsoil
    thickness_m: [0.2, 1.8]
    driven_by:
      - rainfall
      - slope
      - biome
  - material: weathered_basalt
    thickness_m: [0.5, 6.0]
    driven_by:
      - rainfall
      - geological_age
  - material: basalt
    thickness_m: remaining
deposits:
  - id: beach_sand
    mask: beach_suitability
    thickness_m: [0.3, 2.0]
  - id: river_sediment
    mask: river_corridor
    thickness_m: [0.2, 1.5]
  - id: coral_limestone
    mask: reef_suitability
    thickness_m: [0.5, 3.0]
  - id: peat
    mask: wetland
    thickness_m: [0.3, 2.5]
